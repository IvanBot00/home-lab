apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-auth
  namespace: kube-system
spec:
  basicAuth:
    secret: traefik-dashboard-auth
    removeHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-ip-allowlist
  namespace: kube-system
spec:
  ipAllowList:
    sourceRange:
      - "100.64.0.0/10"   # Tailscale CGNAT range
      - "127.0.0.1/32"
