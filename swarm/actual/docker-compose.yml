services:
  actual_server:
    image: docker.io/actualbudget/actual-server:latest
    environment:
      # Uncomment any of the lines below to set configuration options.
      # - ACTUAL_HTTPS_KEY=/data/selfhost.key
      # - ACTUAL_HTTPS_CERT=/data/selfhost.crt
      - ACTUAL_PORT=5006
      # - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      # - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      # - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
      # See all options and more details at https://actualbudget.org/docs/config/
    volumes:
      - actual_data:/data
    networks:
      - traefik-proxy
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.actual.rule=Host(`actual.regularlab.xyz`)"
        - "traefik.http.routers.actual.entrypoints=web"
        - "traefik.http.services.actual.loadbalancer.server.port=5006"

networks:
  traefik-proxy:
    external: true

volumes:
  actual_data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/appdata/actual"
