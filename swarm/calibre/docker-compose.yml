services:
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1028
      - PGID=100
      - TZ=America/Los_Angeles
    volumes:
      - calibre_config:/config
    networks:
      - traefik-proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nas == synology-nas
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.calibre.rule=Host(`calibre.regularlab.xyz`)"
        - "traefik.http.routers.calibre.entrypoints=websecure"
        - "traefik.http.routers.calibre.tls=true"
        - "traefik.http.routers.calibre.tls.certresolver=letsencrypt"
        - "traefik.http.services.calibre.loadbalancer.server.port=8080"

networks:
  traefik-proxy:
    external: true

volumes:
  calibre_config:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/data/media/books/calibre"
