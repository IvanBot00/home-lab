services:
  app:
    image: machines/filestash:latest
    environment:
      - APPLICATION_URL=filestash.regularlab.xyz
      - CANARY=true
    volumes:
      - filestash_data:/app/data/state/
    networks:
      - traefik-proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nas == synology-nas
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.filestash.rule=Host(`filestash.regularlab.xyz`)"
        - "traefik.http.routers.filestash.entrypoints=websecure"
        - "traefik.http.routers.filestash.tls=true"
        - "traefik.http.routers.filestash.tls.certresolver=letsencrypt"
        - "traefik.http.services.filestash.loadbalancer.server.port=8334"

networks:
  traefik-proxy:
    external: true

volumes:
  filestash_data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/appdata/filestash"
