services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=homepage.regularlab.xyz
    networks:
      - traefik-proxy
    volumes:
      - homepage_config:/app/config
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.homepage.rule=Host(`homepage.regularlab.xyz`)"
        - "traefik.http.routers.homepage.entrypoints=websecure"
        - "traefik.http.routers.homepage.tls=true"
        - "traefik.http.routers.homepage.tls.certresolver=letsencrypt"
        - "traefik.http.services.homepage.loadbalancer.server.port=3000"

networks:
  traefik-proxy:
    external: true

volumes:
  homepage_config:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/appdata/homepage/config"
