services:
  jellytest:
    image: jellyfin/jellyfin:latest
    volumes:
      - jellytest_config:/config
      - jellytest_cache:/cache
      - jellytest_media:/media:ro
    networks:
      - traefik-proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.nas == synology-nas
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.jellytest.rule=Host(`jellytest.regularlab.xyz`)"
        - "traefik.http.routers.jellytest.entrypoints=web"
        - "traefik.http.services.jellytest.loadbalancer.server.port=8096"

networks:
  traefik-proxy:
    external: true

volumes:
  jellytest_config:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/appdata/jellytest/config"
  jellytest_cache:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/appdata/jellytest/cache"
  jellytest_media:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,ro,nfsvers=4,hard,intr
      device: ":/volume1/source"
