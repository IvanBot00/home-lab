services:
  lldap:
    image: lldap/lldap:stable
    ports:
      - "389:3890"
      - "17170:17170"
    volumes:
      - lldap_data:/data
    environment:
      - TZ=America/New_York
      - LLDAP_LDAP_BASE_DN=dc=regularlab,dc=xyz
      - LLDAP_LDAP_USER_EMAIL=admin@regularlab.xyz
      - LLDAP_JWT_SECRET_FILE=/run/secrets/lldap_jwt_secret
      - LLDAP_KEY_SEED_FILE=/run/secrets/lldap_key_seed
      - LLDAP_LDAP_USER_PASS_FILE=/run/secrets/lldap_ldap_user_pass
    secrets:
      - lldap_jwt_secret
      - lldap_key_seed
      - lldap_ldap_user_pass
    networks:
      - traefik-proxy
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.lldap.rule=Host(`lldap.regularlab.xyz`)"
        - "traefik.http.routers.lldap.entrypoints=websecure"
        - "traefik.http.routers.lldap.tls.certresolver=letsencrypt"
        - "traefik.http.services.lldap.loadbalancer.server.port=17170"

secrets:
  lldap_jwt_secret:
    external: true
  lldap_key_seed:
    external: true
  lldap_ldap_user_pass:
    external: true

networks:
  traefik-proxy:
    external: true

volumes:
  lldap_data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.10.10.3,rw,nfsvers=4,hard,intr
      device: ":/volume1/appdata/lldap"
